apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-gateway
  namespace: default
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: jwtlab.local
  - name: https
    protocol: HTTPS
    port: 443
    hostname: jwtlab.local
    tls:
      mode: Terminate
      certificateRefs:
        - kind: Secret
          group: ""
          name: my-gateway-tls
