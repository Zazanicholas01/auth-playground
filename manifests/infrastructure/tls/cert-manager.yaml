apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: local-root-ca
  secretName: local-root-ca
  subject:
    organizations:
      - Local lab
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-ca
spec:
  ca:
    secretName: local-root-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: my-gateway-tls
  namespace: default
spec:
  secretName: my-gateway-tls
  commonName: jwtlab.local
  dnsNames:
    - jwtlab.local
  issuerRef:
    name: local-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: local-root-ca-bundle
spec:
  sources:
    - secret:
        name: local-root-ca
        key: tls.crt
  target:
    configMap:
      key: ca.crt
    namespaceSelector:
      matchLabels:
        trust.local/enabled: "true"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-gateway-tls
  namespace: default
spec:
  secretName: keycloak-gateway-tls
  dnsNames:
    - keycloak.demo.local
  issuerRef:
    name: local-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oidclab-gateway-tls
  namespace: default
spec:
  secretName: oidclab-gateway-tls
  dnsNames:
    - oidclab.local
  issuerRef:
    name: local-ca
    kind: ClusterIssuer
    group: cert-manager.io