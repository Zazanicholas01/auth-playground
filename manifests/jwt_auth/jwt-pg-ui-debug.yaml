apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-pg-ui-debug-static
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>JWT PG Debug</title>
      <link rel="stylesheet" href="/jwt-pg-ui-debug/styles.css">
    </head>
    <body>
      <header class="hero">
        <div>
          <p class="eyebrow">PostgreSQL Watch</p>
          <h1>JWT Auth Database Debug</h1>
          <p class="subtle">Polling every 10 seconds from the auth server debug endpoint.</p>
        </div>
        <div class="meta">
          <div>Last refresh</div>
          <strong id="last-refresh">Never</strong>
          <button onclick="loadData(true)">Refresh now</button>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>users</h2>
            <span id="users-count">0 rows</span>
          </div>
          <div class="table-wrap">
            <table id="users-table">
              <thead>
                <tr>
                  <th>id</th>
                  <th>username</th>
                  <th>email</th>
                  <th>role</th>
                  <th>active</th>
                  <th>created_at</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="6">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>refresh_tokens</h2>
            <span id="tokens-count">0 rows</span>
          </div>
          <div class="table-wrap">
            <table id="tokens-table">
              <thead>
                <tr>
                  <th>id</th>
                  <th>user_id</th>
                  <th>token_hash</th>
                  <th>expires_at</th>
                  <th>revoked_at</th>
                  <th>created_at</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="6">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <section class="panel status-panel">
        <div class="panel-head">
          <h2>Status</h2>
        </div>
        <pre id="status">Waiting for first poll...</pre>
      </section>

      <script src="/jwt-pg-ui-debug/app.js"></script>
    </body>
    </html>

  styles.css: |
    :root {
      --bg: #f4efe7;
      --bg-2: #e7ded2;
      --ink: #1f2937;
      --muted: #6b7280;
      --panel: rgba(255, 252, 247, 0.92);
      --line: #d7c8b6;
      --accent: #0f766e;
      --accent-2: #115e59;
      --shadow: 0 18px 40px rgba(78, 52, 24, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .subtle {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .meta {
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      padding: 16px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffdfa;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #eadfce;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f7f0e6;
      z-index: 1;
    }

    td.hash {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-panel {
      margin-top: 20px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      color: var(--accent-2);
      font-family: "Courier New", monospace;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero {
        flex-direction: column;
      }
    }

  app.js: |
    const debugUrl = "/api/auth/jwt/debug/db";
    const pollIntervalMs = 10000;
    let pollHandle = null;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function formatValue(value) {
      if (value === null || value === undefined) {
        return "";
      }
      return String(value);
    }

    function renderTable(tableId, rows, columns, countId, emptyMessage) {
      const tbody = document.querySelector("#" + tableId + " tbody");
      const count = document.getElementById(countId);

      count.textContent = rows.length + (rows.length === 1 ? " row" : " rows");

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="' + columns.length + '">' + emptyMessage + '</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const cells = columns.map(column => {
          const cls = column === "token_hash" ? ' class="hash"' : "";
          return "<td" + cls + ">" + escapeHtml(formatValue(row[column])) + "</td>";
        }).join("");
        return "<tr>" + cells + "</tr>";
      }).join("");
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function loadData(manual) {
      if (manual) {
        setStatus("Refreshing...");
      }

      try {
        const res = await fetch(debugUrl, {
          method: "GET",
          cache: "no-store"
        });

        const text = await res.text();

        if (!res.ok) {
          setStatus("Request failed with status " + res.status + "\n\n" + text);
          return;
        }

        const parsed = JSON.parse(text);
        const users = parsed?.data?.users || [];
        const refreshTokens = parsed?.data?.refresh_tokens || [];
        const refreshedAt = parsed?.data?.refreshed_at || new Date().toISOString();

        renderTable(
          "users-table",
          users,
          ["id", "username", "email", "role", "is_active", "created_at"],
          "users-count",
          "No users found"
        );

        renderTable(
          "tokens-table",
          refreshTokens,
          ["id", "user_id", "token_hash", "expires_at", "revoked_at", "created_at"],
          "tokens-count",
          "No refresh tokens found"
        );

        document.getElementById("last-refresh").textContent = new Date(refreshedAt).toLocaleString();
        setStatus("OK\nFetched at: " + refreshedAt + "\nUsers: " + users.length + "\nRefresh tokens: " + refreshTokens.length);
      } catch (error) {
        setStatus("Request failed\n\n" + error);
      }
    }

    function startPolling() {
      loadData(false);
      pollHandle = setInterval(() => {
        loadData(false);
      }, pollIntervalMs);
    }

    startPolling();
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-pg-ui-debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwt-pg-ui-debug
  template:
    metadata:
      labels:
        app: jwt-pg-ui-debug
    spec:
      containers:
        - name: ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: ui-static
              mountPath: /usr/share/nginx/html
      volumes:
        - name: ui-static
          configMap:
            name: jwt-pg-ui-debug-static
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-pg-ui-debug-service
spec:
  type: ClusterIP
  selector:
    app: jwt-pg-ui-debug
  ports:
    - port: 80
      targetPort: 80
