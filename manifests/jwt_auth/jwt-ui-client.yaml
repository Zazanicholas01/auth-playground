apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-ui-static
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>JWT Auth Lab</title>
      <link rel="stylesheet" href="/jwt-ui/styles.css">
    </head>
    <body>
      <h1>JWT Authentication Demo</h1>

      <h2>How it works</h2>
      <ol>
        <li>Register or log in with username/email and password.</li>
        <li>Server returns a short-lived access token and a longer-lived refresh token.</li>
        <li>Client uses the access token for protected API calls.</li>
        <li>Client can rotate tokens with refresh and revoke the refresh token on logout.</li>
      </ol>

      <h2>Live Test</h2>

      <label>Username:</label>
      <input id="user" value="admin"><br><br>

      <label>Email:</label>
      <input id="email" value="admin@example.com"><br><br>

      <label>Password:</label>
      <input id="pass" type="password" value="password123"><br><br>

      <button onclick="registerUser()">Register</button>
      <button onclick="login()">Login</button>
      <button onclick="refreshSession()">Refresh</button>
      <button onclick="logout()">Logout</button>
      <button onclick="callProtected()">Call Protected API</button>

      <div id="session-timer" class="session-timer hidden" aria-live="polite">
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="52"></circle>
            <circle class="ring-progress" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="ring-label">
            <strong id="token-seconds">0s</strong>
            <span>left</span>
          </div>
        </div>
        <div class="session-copy">
          <h3>Access Token Session</h3>
          <p id="token-status">No active session</p>
        </div>
      </div>

      <div id="refresh-session-timer" class="session-timer hidden" aria-live="polite">
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="52"></circle>
            <circle class="ring-progress refresh-ring-progress" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="ring-label">
            <strong id="refresh-token-seconds">0s</strong>
            <span>left</span>
          </div>
        </div>
        <div class="session-copy">
          <h3>Refresh Token Session</h3>
          <p id="refresh-token-status">No active refresh session</p>
        </div>
      </div>

      <h3>Access Token</h3>
      <pre id="access-token">No access token yet</pre>

      <h3>Refresh Token</h3>
      <pre id="refresh-token">No refresh token yet</pre>

      <h3>API Server Response</h3>
      <pre id="result">Click a button above to call the JWT auth server</pre>

      <script src="/jwt-ui/app.js"></script>
    </body>
    </html>

  styles.css: |
    :root {
      --bg: #08060f;
      --bg-alt: #120a22;
      --panel: rgba(22, 15, 38, 0.9);
      --panel-border: rgba(179, 116, 255, 0.18);
      --text: #f4ebff;
      --muted: #c8b4ef;
      --primary: #a855f7;
      --primary-strong: #7e22ce;
      --secondary: rgba(255, 255, 255, 0.08);
      --success: #86efac;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 36px 18px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.28), transparent 34%),
        radial-gradient(circle at top left, rgba(91, 33, 182, 0.32), transparent 38%),
        linear-gradient(180deg, var(--bg-alt), var(--bg));
    }

    body {
      max-width: 900px;
      margin: 0 auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 14px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: var(--shadow);
      z-index: -1;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #f5d8ff;
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px rgba(168, 85, 247, 0.25);
    }

    h1::after {
      content: "";
      display: block;
      height: 1px;
      margin-top: 16px;
      background: linear-gradient(90deg, rgba(168, 85, 247, 0.7), transparent);
    }

    h2,
    h3 {
      color: #e8d4ff;
      margin-top: 26px;
      margin-bottom: 10px;
    }

    ol {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.65;
    }

    label {
      display: inline-block;
      min-width: 90px;
      margin-right: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    input {
      width: min(420px, 100%);
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: rgba(8, 6, 15, 0.75);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      border-color: rgba(168, 85, 247, 0.8);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
    }

    br + br {
      display: none;
    }

    button {
      padding: 10px 14px;
      margin: 8px 8px 0 0;
      border: 1px solid rgba(216, 180, 254, 0.16);
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(126, 34, 206, 0.28);
      transition: transform 0.08s ease, filter 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      filter: brightness(1.08);
      box-shadow: 0 16px 36px rgba(126, 34, 206, 0.34);
    }

    button:active {
      transform: translateY(1px);
    }

    button:nth-of-type(2),
    button:nth-of-type(3),
    button:nth-of-type(4),
    button:nth-of-type(5) {
      background: var(--secondary);
      box-shadow: none;
    }

    pre {
      margin: 12px 0 0;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--success);
      white-space: pre-wrap;
      line-height: 1.5;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: auto;
    }

    @media (max-width: 600px) {
      body {
        padding: 24px 14px;
      }

      label {
        display: block;
        min-width: 0;
        margin-bottom: 6px;
      }

      input,
      button {
        width: 100%;
      }
    }

    .session-timer {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 18px 0 8px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
    }

    .session-timer.hidden {
      display: none;
    }

    .ring-wrap {
      position: relative;
      width: 112px;
      height: 112px;
      flex: 0 0 auto;
    }

    .ring {
      width: 112px;
      height: 112px;
      transform: rotate(-90deg);
    }

    .ring-track,
    .ring-progress {
      fill: none;
      stroke-width: 10;
    }

    .ring-track {
      stroke: rgba(255, 255, 255, 0.08);
    }

    .ring-progress {
      stroke: #86efac;
      stroke-linecap: round;
      stroke-dasharray: 326.73;
      stroke-dashoffset: 326.73;
      transition: stroke-dashoffset 0.9s linear, stroke 0.3s ease;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-label strong {
      font-size: 1.25rem;
      color: var(--text);
    }

    .ring-label span,
    .session-copy p {
      color: var(--muted);
    }

    .refresh-ring-progress {
      stroke: #67e8f9;
      filter: drop-shadow(0 0 8px rgba(103, 232, 249, 0.55));
    }


  app.js: |
    const registerUrl = "/api/auth/jwt/register";
    const loginUrl = "/api/auth/jwt/login";
    const refreshUrl = "/api/auth/jwt/refresh";
    const logoutUrl = "/api/auth/jwt/logout";
    const protectedUrl = "/api/auth/jwt/protected";

    let accessToken = "";
    let refreshToken = "";
    let accessTokenExpiresAt = 0;
    let accessTokenLifetimeMs = 0;
    let tokenTimerHandle = null;

    let refreshInFlight = false;
    let accessRefreshTriggeredForCurrentToken = false;

    let refreshTokenExpiresAt = 0;
    let refreshTokenLifetimeMs = 0;
    let refreshTokenTimerHandle = null;
    let refreshRotationTriggeredForCurrentToken = false;

    const ringRadius = 52;
    const ringCircumference = 2 * Math.PI * ringRadius;

    const refreshTokenExpiresInSecondsDefault = 180;
    const accessRefreshThresholdSeconds = 20;
    const refreshRotationThresholdSeconds = 60;

    function renderResult(res, body) {
      const result = document.getElementById("result");
      result.textContent = "Status: " + res.status + "\n\n" + body;
    }

    function updateTokenDisplay() {
      document.getElementById("access-token").textContent =
        accessToken ? "Bearer " + accessToken : "No access token yet";

      document.getElementById("refresh-token").textContent =
        refreshToken ? refreshToken : "No refresh token yet";
    }

    function showSessionTimer() {
      document.getElementById("session-timer").classList.remove("hidden");
    }

    function hideSessionTimer() {
      document.getElementById("session-timer").classList.add("hidden");
    }

    function stopTokenTimer() {
      if (tokenTimerHandle) {
        clearInterval(tokenTimerHandle);
        tokenTimerHandle = null;
      }
    }

    function resetTokenTimerUi() {
      const ring = document.querySelector(".ring-progress");
      ring.style.strokeDasharray = String(ringCircumference);
      ring.style.strokeDashoffset = String(ringCircumference);
      ring.style.stroke = "#86efac";

      document.getElementById("token-seconds").textContent = "0s";
      document.getElementById("token-status").textContent = "No active session";
      hideSessionTimer();
    }

    function startTokenTimer(expiresInSeconds) {
      stopTokenTimer();

      accessTokenLifetimeMs = Number(expiresInSeconds || 0) * 1000;
      accessTokenExpiresAt = Date.now() + accessTokenLifetimeMs;
      accessRefreshTriggeredForCurrentToken = false;

      if (!accessToken || accessTokenLifetimeMs <= 0) {
        resetTokenTimerUi();
        return;
      }

      showSessionTimer();

      async function render() {
        const remainingMs = Math.max(0, accessTokenExpiresAt - Date.now());
        const remainingSeconds = Math.ceil(remainingMs / 1000);
        const progress = accessTokenLifetimeMs > 0 ? remainingMs / accessTokenLifetimeMs : 0;
        const dashOffset = ringCircumference * (1 - progress);
        const ring = document.querySelector(".ring-progress");

        ring.style.strokeDashoffset = String(dashOffset);
        ring.style.stroke = remainingSeconds <= 30 ? "#fca5a5" : "#86efac";

        document.getElementById("token-seconds").textContent = remainingSeconds + "s";
        document.getElementById("token-status").textContent =
          remainingSeconds > 0
            ? "Access token active for current session"
            : "Access token expired";

        if (
          remainingSeconds <= accessRefreshThresholdSeconds &&
          remainingSeconds > 0 &&
          refreshToken &&
          !refreshInFlight &&
          !accessRefreshTriggeredForCurrentToken
        ) {
          accessRefreshTriggeredForCurrentToken = true;
          await refreshSession(true);
          return;
        }

        if (remainingMs <= 0) {
          accessToken = "";
          accessTokenExpiresAt = 0;
          accessTokenLifetimeMs = 0;
          stopTokenTimer();
          updateTokenDisplay();

          document.getElementById("token-status").textContent =
            refreshToken
              ? "Access token expired. Refresh token still available."
              : "Refresh token expired. Login required.";
        }
      }

      render();
      tokenTimerHandle = setInterval(() => {
        render();
      }, 1000);
    }

    function showRefreshTokenTimer() {
      document.getElementById("refresh-session-timer").classList.remove("hidden");
    }

    function hideRefreshTokenTimer() {
      document.getElementById("refresh-session-timer").classList.add("hidden");
    }

    function stopRefreshTokenTimer() {
      if (refreshTokenTimerHandle) {
        clearInterval(refreshTokenTimerHandle);
        refreshTokenTimerHandle = null;
      }
    }

    function resetRefreshTokenTimerUi() {
      const ring = document.querySelector(".refresh-ring-progress");
      ring.style.strokeDasharray = String(ringCircumference);
      ring.style.strokeDashoffset = String(ringCircumference);
      ring.style.stroke = "#67e8f9";

      document.getElementById("refresh-token-seconds").textContent = "0s";
      document.getElementById("refresh-token-status").textContent = "No active refresh session";
      hideRefreshTokenTimer();
    }

    function startRefreshTokenTimer(expiresInSeconds) {
      stopRefreshTokenTimer();

      refreshTokenLifetimeMs = Number(expiresInSeconds || 0) * 1000;
      refreshTokenExpiresAt = Date.now() + refreshTokenLifetimeMs;
      refreshRotationTriggeredForCurrentToken = false;

      if (!refreshToken || refreshTokenLifetimeMs <= 0) {
        resetRefreshTokenTimerUi();
        return;
      }

      showRefreshTokenTimer();

      async function render() {
        const remainingMs = Math.max(0, refreshTokenExpiresAt - Date.now());
        const remainingSeconds = Math.ceil(remainingMs / 1000);
        const progress = refreshTokenLifetimeMs > 0 ? remainingMs / refreshTokenLifetimeMs : 0;
        const dashOffset = ringCircumference * (1 - progress);
        const ring = document.querySelector(".refresh-ring-progress");

        ring.style.strokeDashoffset = String(dashOffset);
        ring.style.stroke = remainingSeconds <= 60 ? "#93c5fd" : "#67e8f9";

        document.getElementById("refresh-token-seconds").textContent = remainingSeconds + "s";
        document.getElementById("refresh-token-status").textContent =
          remainingSeconds > 0
            ? "Refresh token available for session renewal"
            : "Refresh token expired";

        if (
          remainingSeconds <= refreshRotationThresholdSeconds &&
          remainingSeconds > 0 &&
          refreshToken &&
          !refreshInFlight &&
          !refreshRotationTriggeredForCurrentToken
        ) {
          refreshRotationTriggeredForCurrentToken = true;
          await refreshSession(true);
          return;
        }

        if (remainingMs <= 0) {
          refreshToken = "";
          refreshTokenExpiresAt = 0;
          refreshTokenLifetimeMs = 0;
          stopRefreshTokenTimer();
          updateTokenDisplay();
        }
      }

      render();
      refreshTokenTimerHandle = setInterval(() => {
        render();
      }, 1000);
    }

    function clearTokens() {
      accessToken = "";
      refreshToken = "";
      accessTokenExpiresAt = 0;
      accessTokenLifetimeMs = 0;
      refreshTokenExpiresAt = 0;
      refreshTokenLifetimeMs = 0;
      accessRefreshTriggeredForCurrentToken = false;
      refreshRotationTriggeredForCurrentToken = false;

      stopTokenTimer();
      stopRefreshTokenTimer();

      updateTokenDisplay();
      resetTokenTimerUi();
      resetRefreshTokenTimerUi();
    }

    function updateTokensFromParsedResponse(parsed, clearOnFailure) {
      if (parsed?.ok) {
        const hadNewAccessToken = Boolean(parsed?.data?.access_token);
        const hadNewRefreshToken = Boolean(parsed?.data?.refresh_token);

        if (hadNewAccessToken) {
          accessToken = parsed.data.access_token;
        }

        if (hadNewRefreshToken) {
          refreshToken = parsed.data.refresh_token;
        }

        updateTokenDisplay();

        if (hadNewAccessToken && parsed?.data?.expires_in) {
          startTokenTimer(parsed.data.expires_in);
        }

        if (hadNewRefreshToken) {
          startRefreshTokenTimer(
            parsed?.data?.refresh_expires_in || refreshTokenExpiresInSecondsDefault
          );
        }

        return;
      }

      if (clearOnFailure) {
        clearTokens();
      }
    }

    async function sendJson(url, payload) {
      return fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload),
        cache: "no-store"
      });
    }

    async function registerUser() {
      const username = document.getElementById("user").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("pass").value;
      const result = document.getElementById("result");

      result.textContent = "Registering...";

      try {
        const res = await sendJson(registerUrl, { username, email, password });
        const text = await res.text();

        try {
          const parsed = JSON.parse(text);
          updateTokensFromParsedResponse(parsed, true);
        } catch (error) {
          clearTokens();
        }

        renderResult(res, text);
      } catch (err) {
        result.textContent = "Request failed:\n" + err;
      }
    }

    async function login() {
      const username = document.getElementById("user").value;
      const password = document.getElementById("pass").value;
      const result = document.getElementById("result");

      result.textContent = "Logging in...";

      try {
        const res = await sendJson(loginUrl, { username, password });
        const text = await res.text();

        try {
          const parsed = JSON.parse(text);
          updateTokensFromParsedResponse(parsed, true);
        } catch (error) {
          clearTokens();
        }

        renderResult(res, text);
      } catch (err) {
        result.textContent = "Request failed:\n" + err;
      }
    }

    async function refreshSession(silent) {
      const result = document.getElementById("result");

      if (!refreshToken) {
        if (!silent) {
          result.textContent = "No refresh token available";
        }
        return;
      }

      if (refreshInFlight) {
        return;
      }

      refreshInFlight = true;

      if (!silent) {
        result.textContent = "Refreshing session...";
      }

      try {
        const res = await sendJson(refreshUrl, {
          refresh_token: refreshToken
        });

        const text = await res.text();

        try {
          const parsed = JSON.parse(text);
          updateTokensFromParsedResponse(parsed, true);

          if (!silent) {
            renderResult(res, text);
          } else if (!parsed?.ok) {
            result.textContent = "Automatic refresh failed.\n\n" + text;
          }
        } catch (error) {
          clearTokens();
          if (!silent) {
            result.textContent = "Refresh response parsing failed";
          }
        }
      } catch (err) {
        if (!silent) {
          result.textContent = "Request failed:\n" + err;
        } else {
          clearTokens();
        }
      } finally {
        refreshInFlight = false;
      }
    }

    async function logout() {
      const result = document.getElementById("result");

      if (!refreshToken) {
        clearTokens();
        result.textContent = "No refresh token to revoke";
        return;
      }

      result.textContent = "Logging out...";

      try {
        const res = await sendJson(logoutUrl, {
          refresh_token: refreshToken
        });

        const text = await res.text();
        clearTokens();
        renderResult(res, text);
      } catch (err) {
        result.textContent = "Request failed:\n" + err;
      }
    }

    async function callProtected() {
      const result = document.getElementById("result");

      result.textContent = "Calling protected endpoint...";

      try {
        const headers = {};

        if (accessToken) {
          headers.Authorization = "Bearer " + accessToken;
        }

        const res = await fetch(protectedUrl, {
          method: "GET",
          headers,
          cache: "no-store"
        });

        const text = await res.text();

        if (res.status === 401 || res.status === 403) {
          accessToken = "";
          accessTokenExpiresAt = 0;
          accessTokenLifetimeMs = 0;
          stopTokenTimer();
          updateTokenDisplay();
          resetTokenTimerUi();
        }

        renderResult(res, text);
      } catch (err) {
        result.textContent = "Request failed:\n" + err;
      }
    }

    resetTokenTimerUi();
    resetRefreshTokenTimerUi();
    updateTokenDisplay();

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-ui-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwt-ui-client
  template:
    metadata:
      labels:
        app: jwt-ui-client
    spec:
      containers:
        - name: ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: ui-static
              mountPath: /usr/share/nginx/html
      volumes:
        - name: ui-static
          configMap:
            name: jwt-ui-static
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-ui-service
spec:
  type: ClusterIP
  selector:
    app: jwt-ui-client
  ports:
    - port: 80
      targetPort: 80
