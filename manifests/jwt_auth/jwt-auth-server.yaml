apiVersion: v1
kind: Secret
metadata:
  name: jwt-auth-secret
type: Opaque
stringData:
  jwt-secret: password123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-auth-server-js
data:
  index.js: |
    const jwt = require('jsonwebtoken');
    const http = require('http');
    const bcrypt = require('bcryptjs');
    const { Pool } = require('pg');
    const crypto = require('crypto');

    const JWT_SECRET = process.env.JWT_SECRET
    const ACCESS_TOKEN_EXPIRES_IN_SECONDS = Number(process.env.ACCESS_TOKEN_EXPIRES_IN_SECONDS || 900);
    const REFRESH_TOKEN_EXPIRES_IN_SECONDS = Number(process.env.REFRESH_TOKEN_EXPIRES_IN_SECONDS || 604800);

    const db = new Pool({
      host: process.env.DB_HOST,
      port: Number(process.env.DB_PORT || 5432),
      user: process.env.DB_USER,
      password: process.env.DB_PASSWORD,
      database: process.env.DB_NAME
    });

    function issueAccessToken(user) {
      return jwt.sign(
        {
          sub: String(user.id),
          username: user.username,
          role: user.role
        },
        JWT_SECRET,
        {
          expiresIn: ACCESS_TOKEN_EXPIRES_IN_SECONDS,
          issuer: 'jwt-auth-demo'
        }
      );
    }

    function verifyBearerToken(authHeader) {
      if (!authHeader) {
        return { status: 401, error: 'Missing bearer token' };
      }

      const [type, token] = authHeader.split(' ');

      if (type !== 'Bearer' || !token) {
        return { status: 400, error: 'Malformed Authorization header'};
      }

      try {
        const payload = jwt.verify(token, JWT_SECRET, { issuer: 'jwt-auth-demo' });
        return { payload };
      } catch (error) {
        return { status: 403, error: 'Invalid or expired token' };
      }
    }

    function sendJson(res, statusCode, payload) {
      res.statusCode = statusCode;
      res.setHeader('Content-Type', 'application/json');
      res.end(JSON.stringify(payload));
    }

    function collectBody(req) {
      return new Promise((resolve, reject) => {
        let body = '';

        req.on('data', chunk => {
          body += chunk;
        });

        req.on('end', () => {
          resolve(body);
        });

        req.on('error', reject);
      });
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function generateRefreshToken() {
      return crypto.randomBytes(48).toString('base64url');
    }

    function hashToken(token) {
      return crypto.createHash('sha256').update(token).digest('hex');
    }

    async function registerUser({username, email, password}) {
      const existing = await db.query(
        `
        SELECT id
        FROM users
        WHERE LOWER(username) = LOWER($1) OR LOWER(email) = LOWER($2)
        LIMIT 1
        `,
        [username, email]
      );

      if (existing.rows[0]) {
        return { error: 'User already exists' };
      }

      const passwordHash = await bcrypt.hash(password, 12);

      const result = await db.query(
        `
        INSERT INTO users (username, email, password_hash, role)
        VALUES ($1, $2, $3, $4)
        RETURNING id, username, email, role
        `,
        [username, email, passwordHash, 'user']
      );

      return { user: result.rows[0] };
    }

    async function authenticateUser(login, password) {

      const normalizedLogin = login.trim().toLowerCase();

      const result = await db.query(
        `
        SELECT id, username, email, password_hash, role, is_active
        FROM users
        WHERE LOWER(username) = $1 OR LOWER(email) = $1
        LIMIT 1
        `,
        [normalizedLogin]
      );

      const user = result.rows[0]

      if (!user || !user.is_active ){
        return null;
      }

      const passwordMatches = await bcrypt.compare(password, user.password_hash);

      if (!passwordMatches) {
        return null;
      }

      return {
        id: user.id,
        username: user.username,
        email: user.email,
        role: user.role
      };
    }

    async function createRefreshToken(userId) {
      const rawToken = generateRefreshToken();
      const tokenHash = hashToken(rawToken);
      const expiresAt = new Date(Date.now() + REFRESH_TOKEN_EXPIRES_IN_SECONDS * 1000);

      await db.query(
        `
        INSERT INTO refresh_tokens (user_id, token_hash, expires_at)
        VALUES ($1, $2, $3)
        `,
        [userId, tokenHash, expiresAt]
      );

      return {
        refreshToken: rawToken,
        expiresAt
      };
    }

    async function findRefreshToken(rawToken) {
      const tokenHash = hashToken(rawToken);

      const result = await db.query(
        `
        SELECT
          rt.id,
          rt.user_id,
          rt.expires_at,
          rt.revoked_at,
          u.username,
          u.email,
          u.role,
          u.is_active
        FROM refresh_tokens rt
        JOIN users u ON u.id = rt.user_id
        WHERE rt.token_hash = $1
        LIMIT 1
        `,
        [tokenHash]
      );

      return result.rows[0] || null;
    }

    async function revokeRefreshTokenById(id) {
      await db.query(
        `
        UPDATE refresh_tokens
        SET revoked_at = NOW()
        WHERE id = $1
        `,
        [id]
      );
    }

    async function revokeRefreshToken(rawToken) {
      const tokenHash = hashToken(rawToken);

      await db.query(
        `
        UPDATE refresh_tokens
        SET revoked_at = NOW()
        WHERE token_hash = $1
          AND revoked_at IS NULL
        `,
        [tokenHash]
      );
    }

    const server = http.createServer(async (req, res) => {
      const requestPath = new URL(req.url, 'http://localhost').pathname;

      if (req.method === 'POST' && requestPath === '/api/auth/jwt/register') {
        try {
          const rawBody = await collectBody(req);
          const body = rawBody ? JSON.parse(rawBody) : {};
          const { username, email, password } = body;

          if (!username || !email || !password) {
            return sendJson(res, 400, {
              ok: false,
              error: 'Username, Email and Password are required'
            });
          }

          if (typeof username !== 'string' || username.trim().length < 3) {
            return sendJson(res, 400, {
              ok: false,
              error: 'Username must be at least 3 characters'
            });
          }

          if (!isValidEmail(email)) {
            return sendJson(res, 400, {
              ok: false,
              error: 'Invalid email address'
            });
          }

          if (typeof password !== 'string' || password.length < 8) {
            return sendJson(res, 400, {
              ok: false,
              error: 'Password must be at least 8 characters'
            });
          }

          const result = await registerUser({
            username: username.trim(),
            email: email.trim().toLowerCase(),
            password
          });

          if (result.error) {
            return sendJson(res, 409, {
              ok: false,
              error: result.error
            });
          }

          const accessToken = issueAccessToken(result.user);
          const { refreshToken } = await createRefreshToken(result.user.id);

          return sendJson(res, 201, {
            ok: true,
            data: {
              user: result.user,
              access_token: accessToken,
              token_type: 'Bearer',
              expires_in: ACCESS_TOKEN_EXPIRES_IN_SECONDS,
              refresh_token: refreshToken
            }
          });

        } catch (error) {
          console.error('Registration error:', error);
          return sendJson(res, 400, {
            ok: false,
            error: 'Invalid request'
          });
        }
      }

      if (req.method === 'POST' && requestPath === '/api/auth/jwt/login') {
        try {
          const rawBody = await collectBody(req);
          const body = rawBody ? JSON.parse(rawBody) : {};
          const { username, password } = body;

          if (!username || !password) {
            return sendJson(res, 400, { 
              ok: false,
              error: 'Username and Password are required' 
            });
          }
          
          const user = await authenticateUser(username, password);

          if (!user) {
            return sendJson(res, 401, {
              ok: false,
              error: 'Invalid credentials'
            });
          }

          const accessToken = issueAccessToken(user);
          const { refreshToken } = await createRefreshToken(user.id);

          return sendJson(res, 200, {
            ok: true,
            data: {
              access_token: accessToken,
              token_type: 'Bearer',
              expires_in: ACCESS_TOKEN_EXPIRES_IN_SECONDS,
              refresh_token: refreshToken,
              user: {
                id: user.id,
                username: user.username,
                email: user.email,
                role: user.role
              }
            }
          });
        } catch (error) {
          console.error('Login error: ', error);
          return sendJson(res, 500, { 
            ok: false,
            error: 'Server Error' 
          });
        }
      }

      if (req.method === 'POST' && requestPath === '/api/auth/jwt/refresh') {
        try {
          const rawBody = await collectBody(req);
          const body = rawBody ? JSON.parse(rawBody) : {};
          const { refresh_token: refreshToken } = body;

          if (!refreshToken) {
            return sendJson(res, 400, {
              ok: false,
              error: 'refresh_token is required'
            });
          }

          const storedToken = await findRefreshToken(refreshToken);

          if (!storedToken) {
            return sendJson(res, 401, {
              ok: false,
              error: 'Invalid refresh token'
            });
          }

          if (storedToken.revoked_at) {
            return sendJson(res, 401, {
              ok: false,
              error: 'Refresh token revoked'
            });
          }

          if (new Date(storedToken.expires_at).getTime() <= Date.now()) {
            return sendJson(res, 401, {
              ok: false,
              error: 'Refresh token expired'
            });
          }

          if (!storedToken.is_active) {
            return sendJson(res, 403, {
              ok: false,
              error: 'User is inactive'
            });
          }

          await revokeRefreshTokenById(storedToken.id);

          const user = {
            id: storedToken.user_id,
            username: storedToken.username,
            email: storedToken.email,
            role: storedToken.role
          };

          const accessToken = issueAccessToken(user);
          const { refreshToken: nextRefreshToken } = await createRefreshToken(user.id);

          return sendJson(res, 200, {
            ok: true,
            data: {
              access_token: accessToken,
              token_type: 'Bearer',
              expires_in: ACCESS_TOKEN_EXPIRES_IN_SECONDS,
              refresh_token: nextRefreshToken
            }
          });
        } catch (error) {
          console.error('Refresh error:', error);
          return sendJson(res, 500, {
            ok: false,
            error: 'Server error'
          });
        }
      }

      if (req.method === 'POST' && requestPath === '/api/auth/jwt/logout') {
        try {
          const rawBody = await collectBody(req);
          const body = rawBody ? JSON.parse(rawBody) : {};
          const { refresh_token: refreshToken } = body;

          if (!refreshToken) {
            return sendJson(res, 400, {
              ok: false,
              error: 'refresh_token is required'
            });
          }

          await revokeRefreshToken(refreshToken);

          return sendJson(res, 200, {
            ok: true,
            data: {
              message: 'Logged out'
            }
          });
        } catch (error) {
          console.error('Logout error:', error);
          return sendJson(res, 500, {
            ok: false,
            error: 'Server error'
          });
        }
      }

      if (req.method === 'GET' && requestPath === '/api/auth/jwt/protected') {
        const verification = verifyBearerToken(req.headers.authorization);

        if (verification.error) {
          return sendJson(res, verification.status, { 
            ok: false, 
            error: verification.error 
          });
        }

        return sendJson(res, 200, {
          ok: true,
          data: {
            message: 'JWT access granted',
            user_id: verification.payload.sub,
            username: verification.payload.username,
            role: verification.payload.role
          }
        });
      }

      if (
        requestPath === '/api/auth/jwt/login' || 
        requestPath === '/api/auth/jwt/protected' || 
        requestPath === '/api/auth/jwt/register' ||
        requestPath === '/api/auth/jwt/refresh' ||
        requestPath === '/api/auth/jwt/logout'
      ) {
        return sendJson(res, 405, { 
          ok: false, 
          error: 'Method not allowed' 
        });
      }

      if (req.method === 'GET' && requestPath === '/api/auth/jwt') {
        return sendJson(res, 200, {
          message: 'JWT auth API',
          endpoints: [
            'POST /api/auth/jwt/login',
            'GET /api/auth/jwt/protected',
            'POST /api/auth/jwt/register',
            'POST /api/auth/jwt/refresh',
            'POST /api/auth/jwt/logout'
          ]
        });
      }

      return sendJson(res, 404, { ok: false, error: 'Not found' });
    });

    async function start() {

      if (!JWT_SECRET) {
        console.error('JWT_SECRET is required');
        process.exit(1);
      }

      try {
        await db.query('SELECT 1');
        console.log('Database connection estabilished');

        server.listen(8080, () => {
          console.log('JWT Auth Server running on port 8080');
        });
      } catch (error) {
        console.error('Failed to start server: ', error);
        process.exit(1);
      }
    }

    start();
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-auth-server
spec:
  selector:
    matchLabels:
      app: jwt-auth-server
  replicas: 2
  template:
    metadata:
      labels:
        app: jwt-auth-server
    spec:
      containers:
        - name: node
          image: jwt-auth-server:dev-v2
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/node", "/app/index.js"]
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-auth-secret
                  key: jwt-secret
            - name: ACCESS_TOKEN_EXPIRES_IN_SECONDS
              value: "900"
            - name: REFRESH_TOKEN_EXPIRES_IN_SECONDS
              value: "604800"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: authdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: password

          volumeMounts:
            - name: code
              mountPath: /app
          
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
      
      volumes:
        - name: code
          configMap:
            name: jwt-auth-server-js
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-auth-service
spec:
  selector:
    app: jwt-auth-server
  ports:
    - port: 80
      targetPort: 8080
