apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-nginx-conf
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy to the in-cluster auth service
      location /api/auth {
        # Preserve the request URI (/api/auth) when proxying upstream.
        # Using no trailing slash keeps the original URI intact.
        proxy_pass http://auth-service;
        proxy_http_version 1.1;

        # Pass headers through (including Authorization)
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
      }
    }
