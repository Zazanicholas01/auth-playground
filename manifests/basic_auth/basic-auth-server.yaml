apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-server-js
data:
  index.js: |
    const http = require('http')
    const USER = 'admin'
    const PASS = 'password123'

    const server = http.createServer((req, res) => {
      const requestPath = new URL(req.url, 'http://localhost').pathname;
      if (requestPath !== '/api/auth/basic') {
        res.statusCode = 404;
        return res.end('Not Found');
      }

      const auth = req.headers.authorization;

      if (!auth) {
        res.setHeader('WWW-Authenticate', 'Basic realm="Auth Lab"');
        res.statusCode = 401;
        return res.end('Authentication Required!');
      }

      const [type, credentials] = auth.split(' ');
      if (type !== 'Basic' || !credentials) {
        res.statusCode = 400;
        return res.end('Malformed Authorization header');
      }

      const decoded = Buffer.from(credentials, 'base64').toString();
      const [user, pass] = decoded.split(':');

      if (user === USER && pass === PASS) {
        res.statusCode = 200;
        res.end(`Welcome ${user}`);
      } else {
        res.statusCode = 403;
        res.end('Invalid credentials');
      }
    });

    server.listen(8080, () => console.log('Auth server running on port 8080'));
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
spec:
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
      - name: node
        image: node:18-alpine
        command: ["node", "/app/index.js"]
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: auth-server-js
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-server
  ports:
  - port: 80
    targetPort: 8080
