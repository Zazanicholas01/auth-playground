apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: demo-realm
  namespace: keycloak
spec:
  keycloakCRName: demo-keycloak
  realm:
    id: demo
    realm: demo
    enabled: true
    displayName: Demo Realm
    clients:
      - clientId: demo-app
        enabled: true
        publicClient: true
        redirectUris:
          - "http://localhost:3000/*"
        webOrigins:
          - "*"
      
      - clientId: oidc-demo-web
        name: OIDC Demo Web
        enabled: true
        protocol: openid-connect
        publicClient: false
        secret: password123
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        redirectUris:
          - "https://oidclab.local:8443/api/auth/oidc/callback"
        webOrigins:
          - "https://oidclab.local:8443"
