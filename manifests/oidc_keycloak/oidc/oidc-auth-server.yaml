apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-auth-code
  namespace: default
data:
  server.js: |
    const OIDC_PUBLIC_ISSUER = process.env.OIDC_PUBLIC_ISSUER || "https://keycloak.demo.local/realms/demo";
    const OIDC_INTERNAL_ISSUER = process.env.OIDC_INTERNAL_ISSUER;
    const KEYCLOAK_BASE_URL = process.env.KEYCLOAK_BASE_URL || "http://demo-keycloak-service.keycloak.svc.cluster.local:8080";
    const KEYCLOAK_REALM = process.env.KEYCLOAK_REALM || "demo";
    const KEYCLOAK_ADMIN_REALM = process.env.KEYCLOAK_ADMIN_REALM || "master";
    const KEYCLOAK_ADMIN_CLIENT_ID = process.env.KEYCLOAK_ADMIN_CLIENT_ID || "admin-cli";
    const KEYCLOAK_ADMIN_USERNAME = process.env.KEYCLOAK_ADMIN_USERNAME || "admin";
    const KEYCLOAK_ADMIN_PASSWORD = process.env.KEYCLOAK_ADMIN_PASSWORD || "admin123";

    const CLIENT_ID = process.env.OIDC_CLIENT_ID || "oidc-demo-web";
    const CLIENT_SECRET = process.env.OIDC_CLIENT_SECRET || "password123";
    const BASE_URL = process.env.BASE_URL || "http://demo-keycloak-service.keycloak.svc.cluster.local:8080/realms/demo";
    const REDIRECT_URI = `${BASE_URL}/api/auth/oidc/callback`;
    const SESSION_TTL_SECONDS = Number(process.env.SESSION_TTL_SECONDS || 3600);

    const sessions = new Map();

    function nowMs() {
      return Date.now();
    }

    function toIso(ts) {
      return typeof ts === "number" ? new Date(ts).toISOString() : null;
    }

    function secondsRemaining(ts) {
      if (typeof ts !== "number") return null;
      return Math.max(0, Math.floor((ts - nowMs()) / 1000));
    }

    function tokenPreview(token) {
      if (!token) return null;
      if (token.length <= 16) return token;
      return `${token.slice(0, 12)}...${token.slice(-4)}`;
    }

    function randomId() {
      return crypto.randomUUID();
    }

    function readCookies(req) {
      const raw = req.headers.get("cookie") || "";
      const out = {};
      for (const part of raw.split(";")) {
        const [k, ...v] = part.trim().split("=");
        if (!k) continue;
        out[k] = decodeURIComponent(v.join("="));
      }

      return out;
    }

    function json(data, init = {}) {
      return new Response(JSON.stringify(data, null, 2), {
        ...init,
        headers: {
          "content-type": "application/json",
          ...(init.headers || {}),
        },
      });
    }

    function redirect(url, headers = {}) {
      return new Response(null, {
        status: 302,
        headers: {
          location: url,
          ...headers,
        },
      });
    }

    function isHttps(req) {
      const proto = (req.headers.get("x-forwarded-proto") || "").toLowerCase();
      if (proto) {
        return proto.split(",")[0].trim() === "https";
      }
      return new URL(req.url).protocol === "https:";
    }

    function sessionCookie(req, value, maxAge) {
      const attrs = [
        `sid=${encodeURIComponent(value)}`,
        "Path=/",
        "HttpOnly",
        "SameSite=Lax",
      ];

      if (isHttps(req)) {
        attrs.push("Secure");
      }

      if (typeof maxAge === "number") {
        attrs.push(`Max-Age=${maxAge}`);
      }

      return attrs.join("; ");
    }

    async function exchangeCode(code) {
      const body = new URLSearchParams({
        grant_type: "authorization_code",
        code,
        client_id: CLIENT_ID,
        client_secret: CLIENT_SECRET,
        redirect_uri: REDIRECT_URI,
      });

      const res = await fetch(`${OIDC_INTERNAL_ISSUER}/protocol/openid-connect/token`, {
        method: "POST",
        headers: { "content-type": "application/x-www-form-urlencoded" },
        body,
      });

      if (!res.ok) {
        throw new Error(`token exchange failed: ${await res.text()}`);
      }

      return res.json();
    }

    async function fetchUserInfo(accessToken) {
      const res = await fetch(`${OIDC_INTERNAL_ISSUER}/protocol/openid-connect/userinfo`, {
        headers: {
          authorization: `Bearer ${accessToken}`,
        },
      });

      if (!res.ok) {
        const body = await res.text();
        throw new Error(`userinfo failed: status=${res.status} body=${body}`);
      }

      return res.json();
    }

    async function revokeOidcSession(refreshToken) {
      const body = new URLSearchParams({
        client_id: CLIENT_ID,
        client_secret: CLIENT_SECRET,
        refresh_token: refreshToken,
      });

      const res = await fetch(`${OIDC_INTERNAL_ISSUER}/protocol/openid-connect/logout`, {
        method: "POST",
        headers: { "content-type": "application/x-www-form-urlencoded" },
        body,
      });

      if (!res.ok) {
        throw new Error(`oidc logout failed: ${await res.text()}`);
      }
    }

    async function getAdminAccessToken() {
      const body = new URLSearchParams({
        grant_type: "password",
        client_id: KEYCLOAK_ADMIN_CLIENT_ID,
        username: KEYCLOAK_ADMIN_USERNAME,
        password: KEYCLOAK_ADMIN_PASSWORD,
      });

      const res = await fetch(`${KEYCLOAK_BASE_URL}/realms/${KEYCLOAK_ADMIN_REALM}/protocol/openid-connect/token`, {
        method: "POST",
        headers: { "content-type": "application/x-www-form-urlencoded" },
        body,
      });

      if (!res.ok) {
        throw new Error(`admin token failed: ${await res.text()}`);
      }

      const tokenData = await res.json();
      if (!tokenData.access_token) {
        throw new Error("admin token response missing access_token");
      }

      return tokenData.access_token;
    }

    async function createKeycloakUser(payload) {
      const adminToken = await getAdminAccessToken();
      const res = await fetch(`${KEYCLOAK_BASE_URL}/admin/realms/${KEYCLOAK_REALM}/users`, {
        method: "POST",
        headers: {
          authorization: `Bearer ${adminToken}`,
          "content-type": "application/json",
        },
        body: JSON.stringify(payload),
      });

      if (res.status === 201) {
        return { ok: true };
      }

      if (res.status === 409) {
        return { ok: false, reason: "exists" };
      }

      return {
        ok: false,
        reason: "unexpected",
        details: await res.text(),
      };
    }

    async function getRealmUserById(adminToken, userId) {
      const res = await fetch(`${KEYCLOAK_BASE_URL}/admin/realms/${KEYCLOAK_REALM}/users/${encodeURIComponent(userId)}`, {
        method: "GET",
        headers: {
          authorization: `Bearer ${adminToken}`,
        },
      });

      if (res.status === 404) {
        return null;
      }

      if (!res.ok) {
        throw new Error(`get user by id failed: ${await res.text()}`);
      }

      return res.json();
    }

    class OidcUpstreamError extends Error {
      constructor({ status, error, details }) {
        super(error || "oidc_upstream_error");
        this.name = "OidcUpstreamError";
        this.status = status;
        this.details = details || null;
      }
    }

    async function readJsonOrText(res) {
      const raw = await res.text();
      try {
        return { raw, json: JSON.parse(raw) };
      } catch {
        return { raw, json: null };
      }
    }

    async function refreshTokens(refreshToken) {
      if (!OIDC_INTERNAL_ISSUER) {
        throw new OidcUpstreamError({ status: 500, error: "missing_oidc_internal_issuer" });
      }

      const body = new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: refreshToken,
        client_id: CLIENT_ID,
        client_secret: CLIENT_SECRET,
      });

      const res = await fetch(`${OIDC_INTERNAL_ISSUER}/protocol/openid-connect/token`, {
        method: "POST",
        headers: { "content-type": "application/x-www-form-urlencoded" },
        body,
      });

      const { raw, json } = await readJsonOrText(res);

      if (!res.ok) {
        throw new OidcUpstreamError({
          status: res.status,
          error: json?.error || "token_refresh_failed",
          details: json?.error_description || raw,
        });
      }

      return json || JSON.parse(raw);
    }

    async function searchRealmUsers(adminToken, username) {
      const qs = new URLSearchParams({
        username,
        exact: "true",
      });

      const res = await fetch(`${KEYCLOAK_BASE_URL}/admin/realms/${KEYCLOAK_REALM}/users?${qs.toString()}`, {
        method: "GET",
        headers: {
          authorization: `Bearer ${adminToken}`,
        },
      });

      if (!res.ok) {
        throw new Error(`search users failed: ${await res.text()}`);
      }

      return res.json();
    }

    async function resolveRealmUserId(adminToken, user) {
      if (user?.sub) {
        const byId = await getRealmUserById(adminToken, user.sub);
        if (byId?.id) {
          return byId.id;
        }
      }

      if (user?.preferred_username) {
        const matches = await searchRealmUsers(adminToken, user.preferred_username);
        const exact = (matches || []).find((u) => u.username === user.preferred_username);
        if (exact?.id) {
          return exact.id;
        }
      }

      return null;
    }

    async function adminLogoutUserSessions(adminToken, userId) {
      const res = await fetch(`${KEYCLOAK_BASE_URL}/admin/realms/${KEYCLOAK_REALM}/users/${encodeURIComponent(userId)}/logout`, {
        method: "POST",
        headers: {
          authorization: `Bearer ${adminToken}`,
        },
      });

      if (!res.ok) {
        throw new Error(`admin user logout failed: ${await res.text()}`);
      }
    }

    function parseJwtPart(jwt, index) {
      if (!jwt) return null;
      const parts = jwt.split(".");
      if (parts.length < 2 || !parts[index]) return null;
      try {
        return JSON.parse(Buffer.from(parts[index], "base64url").toString("utf8"));
      } catch {
        return null;
      }
    }

    function parseJwt(jwt) {
      return parseJwtPart(jwt, 1);
    }

    function parseJwtHeader(jwt) {
      return parseJwtPart(jwt, 0);
    }

    function normalizeTokenData(tokenResponse, previousTokens) {
      const receivedAt = nowMs();
      const idClaims = parseJwt(tokenResponse.id_token || previousTokens?.id_token);
      const accessClaims = parseJwt(tokenResponse.access_token || previousTokens?.access_token);
      const idHeader = parseJwtHeader(tokenResponse.id_token || previousTokens?.id_token);
      const accessHeader = parseJwtHeader(tokenResponse.access_token || previousTokens?.access_token);

      const accessExpiresAt =
        typeof tokenResponse.expires_in === "number"
          ? receivedAt + (tokenResponse.expires_in * 1000)
          : (accessClaims?.exp ? accessClaims.exp * 1000 : previousTokens?.access_expires_at || null);
      const refreshExpiresAt =
        typeof tokenResponse.refresh_expires_in === "number"
          ? receivedAt + (tokenResponse.refresh_expires_in * 1000)
          : previousTokens?.refresh_expires_at || null;
      const idExpiresAt = idClaims?.exp ? idClaims.exp * 1000 : previousTokens?.id_expires_at || null;

      const accessToken = tokenResponse.access_token || previousTokens?.access_token || null;
      const idToken = tokenResponse.id_token || previousTokens?.id_token || null;
      const refreshToken = tokenResponse.refresh_token || previousTokens?.refresh_token || null;

      return {
        token_type: tokenResponse.token_type || previousTokens?.token_type || null,
        scope: tokenResponse.scope || previousTokens?.scope || null,
        access_token: accessToken,
        id_token: idToken,
        refresh_token: refreshToken,
        access_expires_at: accessExpiresAt,
        refresh_expires_at: refreshExpiresAt,
        id_expires_at: idExpiresAt,
        received_at: receivedAt,
        token_types_received: {
          access_token: Boolean(accessToken),
          id_token: Boolean(idToken),
          refresh_token: Boolean(refreshToken),
        },
        headers: {
          access_token: accessHeader ? { alg: accessHeader.alg || null, kid: accessHeader.kid || null, typ: accessHeader.typ || null } : null,
          id_token: idHeader ? { alg: idHeader.alg || null, kid: idHeader.kid || null, typ: idHeader.typ || null } : null,
        },
        claims: {
          access_token: accessClaims
            ? {
                iss: accessClaims.iss || null,
                sub: accessClaims.sub || null,
                aud: accessClaims.aud || null,
                azp: accessClaims.azp || null,
                scope: accessClaims.scope || null,
                sid: accessClaims.sid || null,
                auth_time: accessClaims.auth_time || null,
                acr: accessClaims.acr || null,
                iat: accessClaims.iat || null,
                exp: accessClaims.exp || null,
              }
            : null,
          id_token: idClaims
            ? {
                iss: idClaims.iss || null,
                sub: idClaims.sub || null,
                aud: idClaims.aud || null,
                azp: idClaims.azp || null,
                sid: idClaims.sid || null,
                auth_time: idClaims.auth_time || null,
                acr: idClaims.acr || null,
                iat: idClaims.iat || null,
                exp: idClaims.exp || null,
              }
            : null,
        },
      };
    }

    function touchSession(session) {
      if (!session) return;
      session.updated_at = nowMs();
    }

    function hasSessionExpired(session) {
      return !session?.local_expires_at || nowMs() >= session.local_expires_at;
    }

    function ensureActiveSession(req, sid, session) {
      if (!session) return null;
      if (!hasSessionExpired(session)) return null;
      if (sid) sessions.delete(sid);
      return json(
        { error: "local_session_expired" },
        {
          status: 401,
          headers: {
            "set-cookie": sessionCookie(req, "", 0),
          },
        }
      );
    }

    function sessionDiagnostics(sid, session) {
      if (!sid || !session) {
        return {
          authenticated: false,
        };
      }

      return {
        authenticated: Boolean(session.user),
        session_id: sid,
        created_at: toIso(session.created_at),
        updated_at: toIso(session.updated_at),
        local_session_expires_at: toIso(session.local_expires_at),
        local_session_expires_in_seconds: secondsRemaining(session.local_expires_at),
      };
    }

    function tokenDiagnostics(session) {
      const tokens = session?.tokens;
      if (!tokens) return null;
      return {
        token_type: tokens.token_type,
        token_types_received: tokens.token_types_received,
        scope: tokens.scope,
        received_at: toIso(tokens.received_at),
        headers: tokens.headers,
        claims: tokens.claims,
        access_token_preview: tokenPreview(tokens.access_token),
        id_token_preview: tokenPreview(tokens.id_token),
        refresh_token_preview: tokenPreview(tokens.refresh_token),
        access_token_expires_at: toIso(tokens.access_expires_at),
        access_token_expires_in_seconds: secondsRemaining(tokens.access_expires_at),
        id_token_expires_at: toIso(tokens.id_expires_at),
        id_token_expires_in_seconds: secondsRemaining(tokens.id_expires_at),
        refresh_token_expires_at: toIso(tokens.refresh_expires_at),
        refresh_token_expires_in_seconds: secondsRemaining(tokens.refresh_expires_at),
      };
    }

    function ensureRefreshState(session) {
      session.__refresh = session.__refresh || {
        in_flight: false,
        last_ok_at: null,
        last_error: null,
      };
      return session.__refresh;
    }

    Bun.serve({
      port: 3000,
      async fetch(req) {
        const url = new URL(req.url);
        console.log(req.method, url.pathname, url.search)
        const cookies = readCookies(req);
        const sid = cookies.sid;
        const session = sid ? sessions.get(sid) : null;

        if (url.pathname === "/api/auth/oidc/login" && req.method === "GET") {
          const state = randomId();
          const nextSid = randomId(); // always new session per login attempt
          const createdAt = nowMs();
          sessions.set(nextSid, {
            state,
            created_at: createdAt,
            updated_at: createdAt,
            local_expires_at: createdAt + (SESSION_TTL_SECONDS * 1000),
            refresh_events: [],
          });
          const idpHint = (url.searchParams.get("idp") || "").trim();

          const authUrl = new URL(`${OIDC_PUBLIC_ISSUER}/protocol/openid-connect/auth`);
          authUrl.searchParams.set("client_id", CLIENT_ID);
          authUrl.searchParams.set("response_type", "code");
          authUrl.searchParams.set("scope", "openid profile email");
          authUrl.searchParams.set("redirect_uri", REDIRECT_URI);
          authUrl.searchParams.set("state", state);
          if (idpHint) {
            authUrl.searchParams.set("kc_idp_hint", idpHint);
          }

          return redirect(authUrl.toString(), {
            "set-cookie": sessionCookie(req, nextSid, SESSION_TTL_SECONDS),
          });
        }

        if (url.pathname === "/api/auth/oidc/callback" && req.method === "GET") {
          if (!session) return new Response("missing session", { status: 400 });

          const kcError = url.searchParams.get("error");
          if (kcError) return redirect(`/?error=${encodeURIComponent(kcError)}`);

          const code = url.searchParams.get("code");
          const state = url.searchParams.get("state");
          if (!code || state !== session.state) return new Response("invalid callback", { status: 400 });

          delete session.state; // consume state once, prevents replay
          touchSession(session);

          try {
            const tokens = await exchangeCode(code);
            if (!tokens.id_token) {
              throw new Error("missing id_token");
            }

            const claims = parseJwt(tokens.id_token);
            session.user = {
              sub: claims.sub,
              preferred_username: claims.preferred_username,
              email: claims.email,
              name: claims.name,
            };
            session.tokens = normalizeTokenData(tokens, session.tokens);
            session.refresh_events = session.refresh_events || [];
            session.refresh_events.unshift({
              at: toIso(nowMs()),
              type: "authorization_code_exchange",
              status: "success",
            });

            return redirect("/", {
              "set-cookie": sessionCookie(req, sid, SESSION_TTL_SECONDS),
            });
          } catch (err) {
            console.error("callback failed", err);
            return redirect("/?error=oidc_callback_failed");
          }
        }

        if (url.pathname === "/api/auth/oidc/diagnostics" && req.method === "GET") {
          if (session) {
            const expiredResponse = ensureActiveSession(req, sid, session);
            if (expiredResponse) return expiredResponse;
            touchSession(session);
          }

          const endpoints = {
            issuer: OIDC_PUBLIC_ISSUER,
            authorization_endpoint: `${OIDC_PUBLIC_ISSUER}/protocol/openid-connect/auth`,
            token_endpoint: `${OIDC_PUBLIC_ISSUER}/protocol/openid-connect/token`,
            userinfo_endpoint: `${OIDC_PUBLIC_ISSUER}/protocol/openid-connect/userinfo`,
            end_session_endpoint: `${OIDC_PUBLIC_ISSUER}/protocol/openid-connect/logout`,
            jwks_uri: `${OIDC_PUBLIC_ISSUER}/protocol/openid-connect/certs`,
            well_known: `${OIDC_PUBLIC_ISSUER}/.well-known/openid-configuration`,
          };

          return json({
            now: new Date().toISOString(),
            oidc: {
              client_id: CLIENT_ID,
              redirect_uri: REDIRECT_URI,
              session_ttl_seconds: SESSION_TTL_SECONDS,
              endpoints,
            },
            session: sessionDiagnostics(sid, session),
            user: session?.user || null,
            tokens: tokenDiagnostics(session),
            refresh_events: (session?.refresh_events || []).slice(0, 20),
          });
        }

        if (url.pathname === "/api/auth/oidc/me" && req.method === "GET") {
          if (!session?.user) {
            return json({ authenticated: false }, { status: 401 });
          }
          const expiredResponse = ensureActiveSession(req, sid, session);
          if (expiredResponse) return expiredResponse;
          touchSession(session);
          return json({
            authenticated: true,
            user: session.user,
          });
        }

        if (url.pathname === "/api/auth/oidc/refresh" && req.method === "POST") {
          if (!session?.user) {
            return json({ error: "not_authenticated" }, { status: 401 });
          }
          const expiredResponse = ensureActiveSession(req, sid, session);
          if (expiredResponse) return expiredResponse;

          const existingRefreshToken = session.tokens?.refresh_token;
          if (!existingRefreshToken) {
            return json({ error: "missing_refresh_token" }, { status: 400 });
          }

          if (session.tokens?.refresh_expires_at && nowMs() >= session.tokens.refresh_expires_at) {
            return json({ error: "refresh_token_expired" }, { status: 401 });
          }

          const refreshState = ensureRefreshState(session);
          if (refreshState.in_flight) {
            return json({ error: "refresh_in_flight" }, { status: 409 });
          }
          refreshState.in_flight = true;

          try {
            const refreshed = await refreshTokens(existingRefreshToken);
            session.tokens = normalizeTokenData(refreshed, session.tokens);
            touchSession(session);
            session.refresh_events = session.refresh_events || [];
            session.refresh_events.unshift({
              at: toIso(nowMs()),
              type: "refresh_token_exchange",
              status: "success",
            });
            refreshState.last_ok_at = toIso(nowMs());
            refreshState.last_error = null;
            return json({
              refreshed: true,
              access_token_expires_at: toIso(session.tokens.access_expires_at),
              refresh_token_expires_at: toIso(session.tokens.refresh_expires_at),
            });
          } catch (err) {
            session.refresh_events = session.refresh_events || [];
            session.refresh_events.unshift({
              at: toIso(nowMs()),
              type: "refresh_token_exchange",
              status: "failed",
              details: String(err?.message || err),
            });
            refreshState.last_error = String(err?.message || err);

            if (err?.name === "OidcUpstreamError") {
              const isInvalidGrant = err.message === "invalid_grant";
              const status = isInvalidGrant ? 401 : (err.status || 502);
              return json({ error: err.message, details: err.details }, { status });
            }

            return json({ error: "refresh_failed", details: String(err?.message || err) }, { status: 502 });

          } finally {
            refreshState.in_flight = false;
          }
        }

        if (url.pathname === "/api/auth/oidc/protected" && req.method === "GET") {
          if (!session?.user) {
            return json({ error: "not_authenticated" }, { status: 401 });
          }
          const expiredResponse = ensureActiveSession(req, sid, session);
          if (expiredResponse) return expiredResponse;
          touchSession(session);

          if (!session.tokens?.access_token || !session.tokens?.access_expires_at || nowMs() >= session.tokens.access_expires_at) {
            return json({ error: "access_token_expired" }, { status: 401 });
          }

          return json({
            ok: true,
            message: "Protected API call succeeded",
            user: session.user,
            now: new Date().toISOString(),
          });
        }

        if (url.pathname === "/api/auth/oidc/register" && req.method === "POST") {
          let body;
          try {
            body = await req.json();
          } catch {
            return json({ error: "invalid_json" }, { status: 400 });
          }

          const username = (body.username || "").trim();
          const email = (body.email || "").trim();
          const password = body.password || "";
          const firstName = (body.firstName || "").trim();
          const lastName = (body.lastName || "").trim();

          if (!username || !email || !password) {
            return json({ error: "username_email_password_required" }, { status: 400 });
          }

          if (password.length < 8) {
            return json({ error: "password_too_short", minLength: 8 }, { status: 400 });
          }

          const result = await createKeycloakUser({
            username,
            email,
            firstName,
            lastName,
            enabled: true,
            emailVerified: false,
            credentials: [
              {
                type: "password",
                value: password,
                temporary: false,
              },
            ],
          });

          if (result.ok) {
            return json({ created: true }, { status: 201 });
          }

          if (result.reason === "exists") {
            return json({ error: "user_exists" }, { status: 409 });
          }

          console.error("user creation failed", result.details);
          return json({ error: "user_creation_failed" }, { status: 500 });
        }

        if (url.pathname === "/api/auth/oidc/logout" && req.method === "POST") {
          if (sid) {
            sessions.delete(sid);
          }

          return new Response(null, {
            status: 204,
            headers: {
              "set-cookie": sessionCookie(req, "", 0),
            },
          });
        }

        if (url.pathname === "/api/auth/oidc/revoke-session" && req.method === "POST") {
          if (!session?.user) {
            return json({ error: "not_authenticated" }, { status: 401 });
          }
          const expiredResponse = ensureActiveSession(req, sid, session);
          if (expiredResponse) return expiredResponse;
          touchSession(session);

          try {
            const adminToken = await getAdminAccessToken();
            const userId = await resolveRealmUserId(adminToken, session.user);
            if (!userId) {
              return json({ error: "user_not_found_in_realm" }, { status: 404 });
            }

            await adminLogoutUserSessions(adminToken, userId);

            if (sid) {
              sessions.delete(sid);
            }

            return json(
              { revoked: true, strategy: "admin_user_logout", userId },
              {
                status: 200,
                headers: {
                  "set-cookie": sessionCookie(req, "", 0),
                },
              }
            );
          } catch (err) {
            console.error("revoke session failed", err);
            if (sid) {
              sessions.delete(sid);
            }
            return json(
              { error: "revoke_failed", details: String(err?.message || err) },
              {
                status: 502,
                headers: {
                  "set-cookie": sessionCookie(req, "", 0),
                },
              }
            );
          }
        }

        if (url.pathname === "/healthz") {
          return new Response("ok");
        }

        return new Response("Not found", { status: 404 });
      },
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-auth-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oidc-auth-server
  template:
    metadata:
      labels:
        app: oidc-auth-server
    spec:
      containers:
        - name: bun
          image: oven/bun:1.2
          command: ["bun", "/app/server.js"]
          ports:
            - containerPort: 3000
          env:
            - name: OIDC_PUBLIC_ISSUER
              value: "https://keycloak.demo.local/realms/demo"
            - name: OIDC_INTERNAL_ISSUER
              value: "http://demo-keycloak-service.keycloak.svc.cluster.local:8080/realms/demo"
            - name: OIDC_CLIENT_ID
              value: "oidc-demo-web"
            - name: OIDC_CLIENT_SECRET
              value: "password123"
            - name: BASE_URL
              value: "https://oidclab.local:8443"
            - name: KEYCLOAK_BASE_URL
              value: "http://demo-keycloak-service.keycloak.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "demo"
            - name: KEYCLOAK_ADMIN_REALM
              value: "master"
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "admin-cli"
            - name: KEYCLOAK_ADMIN_USERNAME
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: "admin123"
          
          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true
          
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          
      volumes:
        - name: app-code
          configMap:
            name: oidc-auth-code
---
apiVersion: v1
kind: Service
metadata:
  name: oidc-auth-service
  namespace: default
spec:
  selector:
    app: oidc-auth-server
  ports:
    - port: 80
      targetPort: 3000
